{% extends "base.html" %}
{% block content %}
<div class="container">
    <div class="col-md-6 mx-auto card shadow-sm p-4">
        <h4>Edit Patient Details</h4>
        <hr>
        <form method="POST">
            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" name="name" value="{{ patient.name }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Age</label>
                <input type="number" name="age" value="{{ patient.age }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Phone Number</label>
                <input type="text" name="phone" value="{{ patient.phone }}" class="form-control" required>
            </div>
            <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-primary">Update Records</button>
                <a href="{{ url_for('patients') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
